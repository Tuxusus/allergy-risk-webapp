<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allergy Risk Web App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ef45c9a8-2dbb-41a1-af00-3a189a8eb9bb&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header class="header">
            <h1>🌿 Allergy Risk Web App</h1>
            <p>Оценка аллергического риска по местоположению</p>
        </header>

        <!-- Основной контент -->
        <div class="main-container">
            <!-- Карта слева -->
            <div class="map-section">
                <div id="map" style="width: 100%; height: 500px; border-radius: 12px;"></div>
                <div class="coords-info" id="coords-info">
                    <p>📍 Нажмите на карту, чтобы выбрать точку</p>
                </div>
            </div>

            <!-- Панель справа -->
            <div class="info-panel">
                <!-- Блок риска -->
                <div class="info-card risk-card">
                    <h3>⚠️ Текущий риск</h3>
                    <div class="risk-value" id="risk-value">—</div>
                    <div class="risk-details" id="risk-details">
                        <p>Температура: <span id="temp">—</span>°C</p>
                        <p>Ветер: <span id="wind">—</span> м/с</p>
                        <p>Влажность: <span id="humidity">—</span>%</p>
                    </div>
                </div>

                <!-- Блок прогноза -->
                <div class="info-card forecast-card">
                    <h3>📈 Прогноз</h3>
                    <div class="forecast-text" id="forecast-text">Нажмите на карту, чтобы получить прогноз</div>
                </div>

                <!-- Блок маршрута -->
                <div class="info-card route-card">
                    <h3>🗺️ Риск маршрута</h3>
                    <div class="route-value" id="route-value">—</div>
                    <div class="route-details" id="route-details">Выберите точку на карте</div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
