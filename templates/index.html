<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allergy Risk — умный маршрутизатор для аллергиков</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">Allergy Risk</span>
            </div>
            <div class="badge">альфа</div>
        </div>

        <div class="main-container">
            <div class="map-section">
                <div id="map"></div>
                <div class="coords-info" id="coords-info">
                    <span>📍</span> Нажмите на карту, чтобы оценить риск
                </div>
            </div>

            <div class="info-panel">
                <div class="info-card">
                    <div class="card-header">
                        <span class="card-icon">⚠️</span>
                        <h3>Текущий риск</h3>
                    </div>
                    <div class="risk-value" id="risk-value">—</div>
                    <div class="risk-details">
                        <div class="detail-item">
                            <span>🌡️ Температура</span>
                            <span id="temp">—</span>
                        </div>
                        <div class="detail-item">
                            <span>💨 Ветер</span>
                            <span id="wind">—</span>
                        </div>
                        <div class="detail-item">
                            <span>💧 Влажность</span>
                            <span id="humidity">—</span>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <div class="card-header">
                        <span class="card-icon">📈</span>
                        <h3>Прогноз</h3>
                    </div>
                    <div class="forecast-text" id="forecast-text">
                        Нажмите на карту
                    </div>
                </div>

                <div class="info-card">
                    <div class="card-header">
                        <span class="card-icon">🗺️</span>
                        <h3>Маршрут</h3>
                    </div>
                    <div class="route-inputs">
                        <input type="text" id="route-from" placeholder="Откуда" value="Москва, Красная площадь">
                        <input type="text" id="route-to" placeholder="Куда" value="Москва, Парк Горького">
                        <button id="build-route-btn">Построить маршрут</button>
                    </div>
                    <div class="route-value" id="route-value">—</div>
                    <div class="route-details" id="route-details">
                        Постройте маршрут, чтобы оценить риск
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
